services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: aquasentinel
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nats:
    image: nats:2
    ports:
      - "4222:4222"

  core-service:
    build: ./src/core-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/aquasentinel
      NATS_URL: nats://nats:4222
    depends_on:
      - postgres
      - nats
    ports:
      - "8001:8000"

  ml-service:
    build: ./src/ml-service
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    ports:
      - "8002:8000"

  ingestion-service:
    build: ./src/ingestion-service
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    ports:
      - "8003:8000"

  api-gateway:
    build: ./src/api-gateway
    environment:
      CORE_SERVICE_URL: http://core-service:8000
      ML_SERVICE_URL: http://ml-service:8000
      INGESTION_SERVICE_URL: http://ingestion-service:8000
    depends_on:
      - core-service
      - ml-service
      - ingestion-service
    ports:
      - "8000:8000"

  frontend:
    build: ./src/frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"
