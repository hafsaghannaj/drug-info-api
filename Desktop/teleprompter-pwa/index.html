<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="description" content="Mini Teleprompter with speed, font, and mirror controls." />
    <title>Mini Teleprompter</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <aside class="panel">
        <div class="brand">
          <div class="logo">TP</div>
          <div>
            <h1>Mini Teleprompter</h1>
            <p>Clean cues for steady delivery.</p>
          </div>
        </div>

        <div>
          <label for="script">Script</label>
          <textarea id="script" placeholder="Paste your script here..."></textarea>
        </div>

        <div class="row">
          <button id="start">Start</button>
          <button id="pause" class="secondary" disabled>Pause</button>
          <button id="reset" class="secondary">Reset</button>
        </div>

        <div class="row">
          <div class="control">
            <label for="speed">Speed</label>
            <input id="speed" type="range" min="10" max="240" value="70" />
            <span id="speedVal" class="value"></span>
          </div>
          <div class="control">
            <label for="font">Font size</label>
            <input id="font" type="range" min="24" max="88" value="48" />
            <span id="fontVal" class="value"></span>
          </div>
        </div>

        <div class="row">
          <div class="control">
            <label for="line">Line height</label>
            <input id="line" type="range" min="120" max="190" value="140" />
            <span id="lineVal" class="value"></span>
          </div>
        </div>

        <div class="cue-panel">
          <div class="cue-head">
            <label>Cues</label>
            <div class="cue-actions">
              <button id="prevCue" class="secondary small">Prev</button>
              <button id="nextCue" class="secondary small">Next</button>
              <button id="nextPlay" class="secondary small">Next + Play</button>
              <button id="autoplay" class="secondary small toggle">Auto-play: Off</button>
            </div>
          </div>
          <div id="cueList" class="cue-list"></div>
          <div class="hint">Add cues by starting a line with <code>##</code> or wrapping it like <code>[[Section]]</code>.</div>
        </div>

        <div class="row">
          <button id="mirror" class="secondary toggle">Mirror: Off</button>
          <button id="guide" class="secondary toggle on">Guide: On</button>
          <button id="fullscreen" class="secondary">Fullscreen</button>
        </div>

        <div class="hint">
          Controls: <kbd>Space</kbd> play or pause, <kbd>Up</kbd>/<kbd>Down</kbd> speed, <kbd>+</kbd>/<kbd>-</kbd> font,
          <kbd>[</kbd>/<kbd>]</kbd> line height, <kbd>N</kbd>/<kbd>P</kbd> next or previous cue, <kbd>Shift</kbd>+<kbd>N</kbd> next + play, <kbd>A</kbd> auto-play, <kbd>R</kbd> reset.
        </div>
      </aside>

      <main class="stage">
        <div class="stage-top">
          <div class="status" id="timeStatus">Ready</div>
          <div class="status" id="posStatus"></div>
        </div>
        <div class="viewport" id="viewport">
          <div class="guide" id="guideLine"></div>
          <div class="text" id="teletext"></div>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
